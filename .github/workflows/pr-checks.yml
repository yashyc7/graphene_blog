name: PR Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # ─────────────────────────────────────────
  # Block draft PRs from running full CI
  # ─────────────────────────────────────────
  check-draft:
    name: Skip draft PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - run: echo "PR is ready for review, running checks."

  # ─────────────────────────────────────────
  # Enforce conventional commit PR title
  # ─────────────────────────────────────────
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    needs: check-draft
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types (conventional commits)
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            perf
            ci
          requireScope: false

  # ─────────────────────────────────────────
  # Check no .env or secrets committed
  # ─────────────────────────────────────────
  secret-scan:
    name: Detect Secrets
    runs-on: ubuntu-latest
    needs: check-draft
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for proper diff

      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # Label PR by changed files automatically
  # ─────────────────────────────────────────
  auto-label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    needs: check-draft
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
