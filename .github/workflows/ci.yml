name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Code Quality (fast, fail-fast)
  # ─────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install quality tools
        run: pip install black isort flake8 mypy django-stubs graphene-stubs

      - name: Check formatting (black)
        run: black --check --diff .

      - name: Check import order (isort)
        run: isort --check-only --diff .

      - name: Lint (flake8)
        run: flake8 .

      # - name: Type check (mypy)
      #   run: |
      #     mypy --explicit-package-bases \
      #       --exclude 'apps/(blog|users|common)/mutations.py' \
      #       --exclude 'apps/(blog|users)/models.py' \
      #       --exclude 'config/settings.py' \
      #       apps/ config/

  # ─────────────────────────────────────────
  # JOB 2: Security Scan
  # ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run bandit (static security analysis)
        run: bandit -r apps/ config/ -ll  # -ll = only medium/high severity

      - name: Audit dependencies (pip-audit)
        run: pip-audit -r requirements.txt

  # ─────────────────────────────────────────
  # JOB 3: Tests
  # ─────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: code-quality  # only run tests if quality checks pass

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]  # test on multiple versions

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: blog_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run tests with coverage
        env:
          SECRET_KEY: "ci-test-secret-key-not-real"
          DEBUG: "True"
          DB_NAME: blog_test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          pytest \
            --cov=apps \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'  # upload once
        with:
          file: coverage.xml
          fail_ci_if_error: false
